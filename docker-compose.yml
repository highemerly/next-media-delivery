services:
  media-delivery:
    build: .
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
      - "${ADMIN_PORT:-3001}:${ADMIN_PORT:-3001}"
    tmpfs:
      - /cache
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/healthz"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
