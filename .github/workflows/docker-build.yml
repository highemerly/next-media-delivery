name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  K8S_REPO: highemerly/k8sg1-repo
  K8S_MANIFEST_PATH: manifests/media-delivery/prd/deployment.yaml

jobs:
  # ------------------------------------------------------------------ #
  # Job 1: Build & Integration tests (全ブランチ・全PR)
  # [WIP] コミットメッセージまたはPRタイトルが [WIP] で始まる場合はスキップ
  # ------------------------------------------------------------------ #
  test:
    name: Build & Integration Tests
    if: |
      !startsWith(github.event.head_commit.message, '[WIP]') &&
      !startsWith(github.event.pull_request.title, '[WIP]')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start media-delivery
        run: |
          cp .env.ci .env
          docker compose up -d --wait --build

      - name: Run integration tests
        run: bash scripts/test/run-all.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  # ------------------------------------------------------------------ #
  # Job 2: Build & push Docker image to GHCR
  # main への push のみ実行
  # ------------------------------------------------------------------ #
  build-and-push:
    name: Build & Push Docker Image
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ------------------------------------------------------------------ #
  # Job 3: Create PR to k8s manifest repository
  # ------------------------------------------------------------------ #
  create-k8s-pr:
    name: Create k8s Manifest PR
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout k8s manifest repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.K8S_REPO }}
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: k8s-repo

      - name: Update image tag in manifest
        id: update
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          MANIFEST="k8s-repo/${{ env.K8S_MANIFEST_PATH }}"

          sed -i "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:.*|image: ${NEW_IMAGE}|g" "${MANIFEST}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "new_image=${NEW_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.K8S_REPO_TOKEN }}
          path: k8s-repo
          commit-message: "chore: update media-delivery to ${{ steps.update.outputs.version }}"
          branch: "update/media-delivery-${{ steps.update.outputs.version }}"
          delete-branch: true
          title: "chore: update media-delivery to ${{ steps.update.outputs.version }}"
          body: |
            ## media-delivery image update

            | | |
            |---|---|
            | **New image** | `${{ steps.update.outputs.new_image }}` |
            | **Source commit** | ${{ github.repository }}@${{ github.sha }} |
            | **Triggered by** | ${{ github.actor }} |

            ### Changes
            ${{ github.event.head_commit.message }}

            ---
            *Auto-generated by [GitHub Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          labels: media-delivery
